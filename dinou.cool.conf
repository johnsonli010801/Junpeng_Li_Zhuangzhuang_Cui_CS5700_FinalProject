# YouChat - dinou.cool Nginx 配置（HTTPS）
# 创建时间：2025年12月3日

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name dinou.cool www.dinou.cool;
    
    # SSL 证书配置（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/dinou.cool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dinou.cool/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 文件上传大小限制
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # 访问和错误日志
    access_log /var/log/nginx/dinou.cool.access.log;
    error_log /var/log/nginx/dinou.cool.error.log;
    
    # 前端静态文件（根路径）
    location / {
        root /root/YouChat/frontend/dist;
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存（开发阶段使用较短缓存时间）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 5m;
            add_header Cache-Control "public, max-age=300";
        }
    }
    
    # 后端 API 代理
    location /api/ {
        client_max_body_size 50M;
        
        proxy_pass http://localhost:4000/api/;
        proxy_http_version 1.1;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Socket.IO WebSocket 连接
    location /socket.io/ {
        proxy_pass http://localhost:4000/socket.io/;
        proxy_http_version 1.1;
        
        # WebSocket 必需的头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Socket.IO 需要长连接
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
